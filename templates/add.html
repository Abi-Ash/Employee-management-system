<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        form {
            width: 400px;
            background: white;
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        .error {
            color: red;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
    </style>

</head>

<body>

    <h1>Add Employee</h1>

    {% if error %}

    <p class="error">
        {{ error }}
    </p>

    {% endif %}

    <form method="POST">

        <input type="text" name="name" placeholder="Enter Name" required>

        <input type="email" name="email" placeholder="Enter Email" required>

        <input type="text" name="department" placeholder="Enter Department" required>

        <input type="number" name="salary" placeholder="Enter Salary" required>

        <button type="submit">
            Add Employee
        </button>

    </form>

</body>

</html>
