<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee</title>

    <style>

        body{
            font-family: Arial;
            margin:40px;
            background:#f4f4f4;
        }

        form{
            width:400px;
            background:white;
            padding:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
        }

        button{
            background:orange;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
        }

    </style>

</head>
<body>

    <h1>Edit Employee</h1>

    <form method="POST">

        <input type="text"
               name="name"
               value="{{ employee.name }}"
               required>

        <input type="email"
               name="email"
               value="{{ employee.email }}"
               required>

        <input type="text"
               name="department"
               value="{{ employee.department }}"
               required>

        <input type="number"
               name="salary"
               value="{{ employee.salary }}"
               required>

        <button type="submit">
            Update Employee
        </button>

    </form>

</body>
</html>
